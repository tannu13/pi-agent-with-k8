apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sandbox-runner
  namespace: default
spec:
  serviceName: "sandbox-service"
  replicas: 8
  selector:
    matchLabels:
      app: sandbox-runner
  template:
    metadata:
      labels:
        app: sandbox-runner
    spec:
      containers:
        - name: runner
          image: node:20-alpine
          command:
            - "sh"
            - "-c"
            - "mkdir -p /workspace && echo 'red orange yellow green blue indigo violet' > /workspace/rainbow.txt && cd /workspace && while true; do sleep 3600; done"
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: "200m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
